{{- if and (not .Values.cloudflare.existingSecret) .Values.cloudflare.tunnelToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cloudflared-remote.fullname" . }}-token
  labels:
    app.kubernetes.io/name: {{ include "cloudflared-remote.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  {{ .Values.cloudflare.existingSecretKey }}: {{ .Values.cloudflare.tunnelToken | quote }}
{{- end }}
